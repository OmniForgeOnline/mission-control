version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 4
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
      npm-dev-majors:
        dependency-type: development
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
