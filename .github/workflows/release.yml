# Automated releases via Changesets.
#
# On every push to main this either:
#   (a) opens/updates a "Version Packages" PR that bumps the version and
#       rewrites CHANGELOG.md from accumulated .changeset/*.md notes, or
#   (b) if that PR was just merged, publishes to npm and tags a GitHub Release.
#
# Prerequisites:
#   1. Configure @omniforge/mission-control on npm with a trusted publisher for
#      OmniForgeOnline/mission-control using this release.yml workflow.
#   2. npm publish authenticates through GitHub Actions OIDC (id-token: write)
#      and generates provenance via NPM_CONFIG_PROVENANCE.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # tag commits and create GitHub Releases
      pull-requests: write # open the Version Packages PR
      id-token: write # npm trusted publishing and provenance (OIDC)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # changesets needs full history to diff against published versions
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm install -g npm@11

      - name: Version Packages PR or publish
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
