name: Changeset check

# Fails the PR check if a user-facing change ships without a .changeset/*.md
# note. Non-release PRs (docs, chores) opt out with `npm run changeset --
# --empty`. The auto-generated Version Packages PR and Dependabot maintenance
# PRs are excluded.
on:
  pull_request:
    branches: [main]

jobs:
  changeset:
    name: Ensure changeset present
    if: github.event.pull_request.head.ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        if: github.actor != 'dependabot[bot]'
      - run: npx changeset status --since=origin/${{ github.base_ref }}
        if: github.actor != 'dependabot[bot]'
      - name: Skip release gate for Dependabot
        if: github.actor == 'dependabot[bot]'
        run: echo "Dependabot maintenance PRs do not require changesets."
