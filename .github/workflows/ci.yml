name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Full quality gate on the active Node LTS. This package ships compiled JS,
    # so a single lane on Node 22 (Ubuntu) covers the real risk surface; the
    # cross-platform paths are unit-tested.
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Quality gate (lint, typecheck, test, knip, build)
        run: npm run check
