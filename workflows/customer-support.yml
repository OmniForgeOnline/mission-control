id: customer-support
name: Customer Support
initial: triage

defaults:
  agents:
    author: claude
    reviewer: codex
  effort: medium

steps:
  triage:
    kind: conversation
    agent: author
    effort: medium
    skill: customer-support-triage
    approval: none
    next: investigate

  investigate:
    kind: agent_turn
    agent: author
    effort: medium
    skill: customer-support-triage
    approval: none
    next: draft_response

  draft_response:
    kind: agent_turn
    agent: author
    effort: medium
    skill: customer-support-triage
    approval: required
    next: review

  review:
    kind: review
    agent: reviewer
    effort: medium
    skill: customer-support-triage
    review_profile: support
    approval: none
    branch:
      approved: handoff
      changes_requested: draft_response

  handoff:
    kind: terminal
    agent: none
    skill: operator-handoff
    approval: none