id: marketing-asset
name: Marketing Asset
initial: brief

defaults:
  agents:
    author: kiro
    reviewer: claude
  effort: medium

steps:
  brief:
    kind: conversation
    agent: author
    effort: medium
    skill: content-production
    approval: none
    next: draft_asset

  draft_asset:
    kind: agent_turn
    agent: author
    effort: medium
    skill: content-production
    approval: required
    next: brand_review

  brand_review:
    kind: review
    agent: reviewer
    effort: high
    skill: content-production
    review_profile: content
    approval: none
    branch:
      approved: handoff
      changes_requested: draft_asset

  handoff:
    kind: terminal
    agent: none
    skill: operator-handoff
    approval: none